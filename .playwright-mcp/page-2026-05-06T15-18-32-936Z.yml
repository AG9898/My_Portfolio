                  - generic [ref=e3016]:
                    - textbox "Search questions asked on this page..." [ref=e3017]
                    - list [ref=e3018]:
                      - listitem [ref=e3019]:
                        - paragraph [ref=e3025]: How do I know what my volume is?
                        - generic [ref=e3029]:
                          - paragraph [ref=e3030]: Tim Glaser
                          - paragraph [ref=e3031]: The easiest way is to sign up for the Free plan. You'll get an accurate volume projection after just a few days.
                      - listitem [ref=e3032]:
                        - paragraph [ref=e3038]: Do I pay anything for stored events?
                        - generic [ref=e3042]:
                          - paragraph [ref=e3043]: Simon Fisher
                          - paragraph [ref=e3044]: No, you only pay the fee per captured event in a given month (i.e. you only pay when each event is first received). There are no additional costs or fees.
                      - listitem [ref=e3045]:
                        - paragraph [ref=e3051]: How long do you retain data?
                        - generic [ref=e3055]:
                          - paragraph [ref=e3056]: Tiina Turban
                          - paragraph [ref=e3057]: Data (except recordings, see below) is guaranteed to be retained for 7 years on any paid plan and 1 year on a free plan. After 1 year, data may be moved into cold storage so queries may run more slowly.
                      - listitem [ref=e3058]:
                        - paragraph [ref=e3064]: How long do you retain recordings?
                        - generic [ref=e3068]:
                          - paragraph [ref=e3069]: Rick Marron
                          - paragraph [ref=e3070]: Recordings are kept on Clickhouse-based installations for 1 month. For paid customers on PostHog cloud, recordings are kept for 3 months.
                      - listitem [ref=e3071]:
                        - paragraph [ref=e3077]: What happens after the data retention period elapses?
                        - generic [ref=e3081]:
                          - paragraph [ref=e3082]: Marius Andra
                          - paragraph [ref=e3083]: Any event or user data stored for more than the retention period may be permanently deleted from our systems.
                      - listitem [ref=e3084]:
                        - paragraph [ref=e3090]: Is there a free trial on paid plans?
                        - generic [ref=e3094]:
                          - paragraph [ref=e3095]: Michael Matloka
                          - paragraph [ref=e3096]: We have a generous free tier on every paid plan so you can try out the features before paying any money (though you will need to enter your credit card info). If you have additional needs, such as enterprise features, please get in touch.
                      - listitem [ref=e3097]:
                        - paragraph [ref=e3103]: What currency are your prices in?
                        - generic [ref=e3107]:
                          - paragraph [ref=e3108]: James Hawkins
                          - paragraph [ref=e3109]: All prices are in US Dollars (USD), excluding taxes.
                      - listitem [ref=e3110]:
                        - paragraph [ref=e3116]: Do you offer a discount for non-profits?
                        - generic [ref=e3120]:
                          - paragraph [ref=e3121]: Eric Duong
                          - paragraph [ref=e3122]: Yes in most cases! Create your account, then email sales@posthog.com from the same email address with some basic details on your organization. We will then apply a discount.
                      - listitem [ref=e3123]:
                        - paragraph [ref=e3129]: Are there any minimums or annual commitments?
                        - generic [ref=e3133]:
                          - paragraph [ref=e3134]: Cameron DeLeone
                          - paragraph [ref=e3135]: Nope. We can, however, offer annual commitments (for example, to maintain pricing) if you need them as part of an enterprise agreement.
